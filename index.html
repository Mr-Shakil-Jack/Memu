<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শাকিল টেলিকমো</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f0f4f8; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* প্রিমিয়াম কার্ড ডিজাইন */
        .memo-box {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 86, 179, 0.08);
            border: 1px solid #e1e8ed;
            position: relative;
            overflow: hidden;
        }
        
        / */
        .memo-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, #0056b3, #00aaff);
        }

        .header { text-align: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px dashed #ced4da; }
        .header h1 { color: #0056b3; font-size: 26px; font-weight: 800; letter-spacing: 0.5px; }
        .header p { color: #6c757d; font-size: 13px; margin-top: 6px; font-weight: 500; }
        
        .info-input { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 12px; }
        .info-input input { 
            width: 100%; 
            padding: 10px 12px; 
            border: 1px solid #ced4da; 
            border-radius: 8px; 
            font-size: 14px; 
            background-color: #f8f9fa;
            transition: all 0.3s;
        }
        .info-input input:focus { border-color: #0056b3; background-color: #fff; outline: none; box-shadow: 0 0 0 3px rgba(0,86,179,0.1); }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background: #0056b3; color: white; padding: 12px 10px; font-size: 14px; font-weight: 600; text-align: center; }
        th:first-child { border-radius: 6px 0 0 6px; }
        th:last-child { border-radius: 0 6px 6px 0; }
        
        td { padding: 10px 6px; border-bottom: 1px solid #edf2f7; text-align: center; }
        

        .p-name, .p-input { 
            width: 100%; 
            padding: 8px; 
            border: 1px solid #e2e8f0; 
            border-radius: 6px; 
            font-size: 14px; 
            color: #333;
        }
        .p-name { text-align: left; }
        .p-input { text-align: center; }
        .p-name:focus, .p-input:focus { border-color: #0056b3; outline: none; background: #fff; }
        
        .total-clm { font-weight: 700; color: #2d3748; font-size: 14px; }


        .footer-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #edf2f7;
        }
        .thanks-msg { font-size: 12px; color: #718096; font-style: italic; }
        .result-section { font-size: 20px; font-weight: 800; color: #0056b3; }
        
            .btn-container { width: 100%; max-width: 480px; display: flex; gap: 12px; margin-top: 20px; }
        .btn { 
            flex: 1; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-size: 15px; 
            font-weight: 700; 
            cursor: pointer; 
            color: white; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .add-btn { background-color: #2b6cb0; }
        .add-btn:hover { background-color: #2c5282; }
        .wa-btn { background-color: #22c55e; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .wa-btn:hover { background-color: #16a34a; }
    </style>
</head>
<body>

<div class="memo-box" id="digitalMemo">
    <div class="header">
        <h1>শাকিল টেলিকম</h1>
        <p>মোবাইল এক্সেসরিজ ও ইলেকট্রনিক্স পাওয়া যায়</p>
    </div>

    <div class="info-input">
        <input type="text" id="custName" placeholder="ক্রেতার নাম">
        <input type="text" id="memoNo" placeholder="মেমো নং">
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 45%;">পণ্যের নাম</th>
                <th style="width: 20%;">দর (৳)</th>
                <th style="width: 15%;">qty</th>
                <th style="width: 20%;">মোট</th>
            </tr>
        </thead>
        <tbody id="memoBody">
            <tr>
                <td><input type="text" class="p-name" placeholder="যেমন: চার্জার"></td>
                <td><input type="number" class="p-input price" oninput="calculateTotal()" placeholder="0"></td>
                <td><input type="number" class="p-input qty" value="1" oninput="calculateTotal()"></td>
                <td class="total-clm">৳ 0</td>
            </tr>
        </tbody>
    </table>

    <div class="footer-section">
        <div class="thanks-msg">আমাদের সাথে থাকার জন্য ধন্যবাদ!</div>
        <div class="result-section">
            সর্বমোট: <span id="grandTotal">৳ 0</span>
        </div>
    </div>
</div>

<div class="btn-container">
    <button class="btn add-btn" onclick="addRow()">➕ ঘর বাড়ান</button>
    <button class="btn wa-btn" onclick="shareWhatsAppImage()">💬 WhatsApp শেয়ার</button>
</div>

<script>
    function addRow() {
        let tbody = document.getElementById("memoBody");
        let tr = document.createElement("tr");
        tr.innerHTML = `
            <td><input type="text" class="p-name" placeholder="পণ্যের নাম"></td>
            <td><input type="number" class="p-input price" oninput="calculateTotal()" placeholder="0"></td>
            <td><input type="number" class="p-input qty" value="1" oninput="calculateTotal()"></td>
            <td class="total-clm">৳ 0</td>
        `;
        tbody.appendChild(tr);
    }

    function calculateTotal() {
        let rows = document.querySelectorAll("#memoBody tr");
        let grandTotal = 0;

        rows.forEach(row => {
            let price = parseFloat(row.querySelector(".price").value) || 0;
            let qty = parseFloat(row.querySelector(".qty").value) || 0;
            let total = price * qty;
            
            row.querySelector(".total-clm").innerText = "৳ " + total;
            grandTotal += total;
        });

        document.getElementById("grandTotal").innerText = "৳ " + grandTotal;
    }

  
    function shareWhatsAppImage() {
        let memoElement = document.getElementById("digitalMemo");
        let custName = document.getElementById("custName").value || "গ্রাহক";
        let memoNo = document.getElementById("memoNo").value || "01";

       
        let inputs = memoElement.querySelectorAll("input");
        inputs.forEach(input => {
            input.style.border = "none";
            input.style.background = "transparent";
        });

        // html2canvas দিয়ে ইমেজ জেনারেট
        html2canvas(memoElement, { scale: 3, useCORS: true }).then(canvas => {
    
            inputs.forEach(input => {
                input.style.border = "1px solid #ced4da";
                input.style.background = "#f8f9fa";
            });

           
            let image = canvas.toDataURL("image/png");
            let link = document.createElement('a');
            link.download = `Shakil_Telecom_Memo_${memoNo}_${custName}.png`;
            link.href = image;
            link.click();

         
            let textMsg = `🧾 *শাকিল টেলিকম ডিজিটাল মেমো*\n👤 ক্রেতা: ${custName}\n🔢 মেমো নং: ${memoNo}\n\n📸 আপনার মেমোটি ইমেজ আকারে ডিভাইসে ডাউনলোড হয়েছে। অনুগ্রহ করে সেটি নিচে সিলেক্ট করে পাঠিয়ে দিন।`;
            let whatsappUrl = `https://api.whatsapp.com/send?text=${encodeURIComponent(textMsg)}`;
            
            setTimeout(() => {
                window.open(whatsappUrl, '_blank');
            }, 800);
        });
    }
</script>

</body>
</html>
